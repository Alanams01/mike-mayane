<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mayane & Mikhael | L'Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette Pastel Chic & Mature */
            --pastel-blue: #B0C4DE; /* Bleu poudré */
            --soft-ivory: #F9F6F0; /* Ivoire doux pour le texte */
            /* Dégradé bouton : Bleu ciel vers Vert d'eau très clair */
            --btn-grad-1: #A7C7E7; 
            --btn-grad-2: #C1E1C1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #1a1a1a; /* Fond sombre de secours */
            color: var(--soft-ivory);
            font-family: 'Montserrat', sans-serif;
            height: 100dvh; width: 100vw; 
            overflow: hidden; /* Empêche le scroll sur cette page */
            display: flex; justify-content: center; align-items: center; 
            text-align: center; position: relative;
        }

        /* --- CONFIGURATION DE L'IMAGE D'ARRIÈRE-PLAN --- */
        .bg-image {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1; /* Place l'image derrière le texte */
            
            /* L'IMAGE DU COUPLE */
            background: url('couple.jpeg') no-repeat center center / cover;
            
            /* Ajustements pour rendre l'image sombre et élégante (style Karen & Yossef) */
            filter: brightness(0.4) saturate(0.8); 
        }

        /* Container central avec animation d'apparition */
        .intro-container {
            z-index: 1; 
            opacity: 0; 
            animation: fadeIn 2s ease-out forwards 0.5s;
            width: 100%; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Titre Prénoms en police manuscrite */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.3rem, 13vw, 5.5rem); /* Taille adaptative */
            font-weight: 400;
            margin-bottom: 10px;
            /* Dégradé discret Blanc vers Bleu Pastel sur le texte */
            background: linear-gradient(to bottom, #fff 60%, var(--pastel-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            /* Ombre portée pour la lisibilité sur fond photo */
            text-shadow: 2px 2px 15px rgba(0,0,0,0.6);
        }

        /* Compte à rebours */
        .countdown-container { 
            display: flex; justify-content: center; 
            gap: 12px; margin: 25px 0 35px 0; 
        }

        .unit {
            width: 65px; height: 65px; 
            background: rgba(0,0,0,0.5); /* Fond sombre semi-transparent */
            border: 1px solid rgba(255,255,255,0.15); /* Bordure très fine */
            backdrop-filter: blur(8px); /* Effet de flou derrière */
            border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .num { font-size: 1.5rem; font-weight: 600; color: #fff; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }

        /* Ligne de date */
        .date {
            font-size: 1rem; letter-spacing: 5px; 
            padding: 15px 0; min-width: 250px;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 50px; /* Espace avant le bouton */
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* Bouton d'entrée large et pastel */
        .enter-btn {
            display: inline-block; 
            width: 90%; max-width: 380px; /* Largeur sur mobile */
            padding: 22px;
            /* Dégradé Pastel Doux */
            background: linear-gradient(45deg, var(--btn-grad-1), var(--btn-grad-2));
            
            color: #444; /* Texte gris foncé pour le contraste */
            text-decoration: none; 
            font-size: 0.95rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px;
            
            border-radius: 50px; 
            /* Ombre portée douce aux couleurs du bouton */
            box-shadow: 0 10px 30px rgba(167,199,231,0.5);
            
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Effet au clic */
        .enter-btn:active {
            transform: scale(0.97);
            box-shadow: 0 5px 15px rgba(167,199,231,0.4);
        }

        /* Animation d'apparition (Fade In) */
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Ajustements pour petits mobiles */
        @media (max-width: 370px) {
            h1 { font-size: 3rem; }
            .unit { width: 55px; height: 55px; gap: 2px; }
            .num { font-size: 1.3rem; }
            .date { font-size: 0.9rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>

    <div class="intro-container">
        <h1>Mayane & Mikhael</h1>

        <div class="countdown-container" id="timer">
            <div class="unit"><span class="num" id="days">00</span><span class="label">Jours</span></div>
            <div class="unit"><span class="num" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="unit"><span class="num" id="mins">00</span><span class="label">Min</span></div>
            <div class="unit"><span class="num" id="secs">00</span><span class="label">Sec</span></div>
        </div>

        <p class="date">29 JUILLET 2026</p>

        <a href="invitation.html" class="enter-btn">Découvrir l'invitation</a>
    </div>

    <script>
        // Date cible : 29 Juillet 2026 à 17h30 (Heure de l'accueil aux Pyramides)
        const targetDate = new Date("July 29, 2026 17:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                // Calcul du temps restant
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);

                // Affichage avec ajout d'un zéro initial si nécessaire (01, 02...)
                document.getElementById("days").innerText = d.toString().padStart(2, "0");
                document.getElementById("hours").innerText = h.toString().padStart(2, "0");
                document.getElementById("mins").innerText = m.toString().padStart(2, "0");
                document.getElementById("secs").innerText = s.toString().padStart(2, "0");
            } else {
                // Texte à afficher une fois la date passée
                document.getElementById("timer").innerHTML = "<h2 style='font-family:Great Vibes;color:white;font-size:2rem;text-shadow:2px 2px 10px rgba(0,0,0,0.5);'>C'est le grand jour ✨</h2>";
            }
        }

        // Mise à jour chaque seconde
        setInterval(updateCountdown, 1000);
        // Première mise à jour immédiate
        updateCountdown();
    </script>
</body>
</html>
