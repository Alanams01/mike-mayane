<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mayane & Mikhael | L'Union</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-blue-dark: #8294ad; /* Bleu plus soutenu pour la lisibilité */
            --soft-ivory: #F9F6F0;
            --btn-grad-1: #A7C7E7; 
            --btn-grad-2: #C1E1C1;
            --text-main: #333333; /* Gris très foncé presque noir pour bien voir les noms */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #fff;
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            height: 100dvh; width: 100vw; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center; 
            text-align: center; position: relative;
        }

        /* --- FOND CLAIR --- */
        .bg-image {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -1;
            background: url('couple.jpeg') no-repeat center center / cover;
            filter: brightness(0.75) saturate(0.9); 
        }

        .bg-image::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); /* Voile blanc léger */
        }

        .intro-container {
            z-index: 1; 
            opacity: 0; 
            animation: fadeIn 2s ease-out forwards 0.5s;
            width: 100%; padding: 0 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- TITRE PLUS VOYANT --- */
        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.5rem, 15vw, 6rem); /* Un peu plus grand */
            font-weight: 400;
            margin-bottom: 5px;
            /* Dégradé plus contrasté */
            background: linear-gradient(to bottom, #222 30%, var(--pastel-blue-dark));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            /* Double ombre pour faire "sortir" les prénoms du fond */
            text-shadow: 2px 2px 15px rgba(255,255,255,1), 0px 0px 10px rgba(0,0,0,0.1);
            padding-bottom: 5px;
        }

        .countdown-container { 
            display: flex; justify-content: center; 
            gap: 12px; margin: 20px 0 30px 0; 
        }

        .unit {
            width: 65px; height: 65px; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .num { font-size: 1.5rem; font-weight: 600; color: #000; }
        .label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1.5px; color: #555; }

        /* --- DATE PLUS VOYANTE --- */
        .date {
            font-size: 1.1rem; /* Plus grand */
            font-weight: 600; /* Plus gras */
            letter-spacing: 6px; 
            padding: 18px 0; min-width: 280px;
            color: #222; /* Noir doux */
            border-top: 2px solid rgba(0, 0, 0, 0.1); /* Ligne plus épaisse */
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            margin-bottom: 45px;
            text-shadow: 1px 1px 0px rgba(255,255,255,1);
        }

        .enter-btn {
            display: inline-block; 
            width: 90%; max-width: 380px;
            padding: 22px;
            background: linear-gradient(45deg, var(--btn-grad-1), var(--btn-grad-2));
            color: #fff;
            text-decoration: none; 
            font-size: 1rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 3px;
            border-radius: 50px; 
            box-shadow: 0 10px 25px rgba(167,199,231,0.6);
            transition: all 0.3s ease;
        }

        .enter-btn:active {
            transform: scale(0.96);
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(25px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @media (max-width: 370px) {
            h1 { font-size: 3.5rem; }
            .unit { width: 58px; height: 58px; }
            .date { font-size: 0.9rem; letter-spacing: 4px; min-width: 240px; }
        }
    </style>
</head>
<body>
    <div class="bg-image"></div>

    <div class="intro-container">
        <h1>Mayane & Mikhael</h1>

        <div class="countdown-container" id="timer">
            <div class="unit"><span class="num" id="days">00</span><span class="label">Jours</span></div>
            <div class="unit"><span class="num" id="hours">00</span><span class="label">Hrs</span></div>
            <div class="unit"><span class="num" id="mins">00</span><span class="label">Min</span></div>
            <div class="unit"><span class="num" id="secs">00</span><span class="label">Sec</span></div>
        </div>

        <p class="date">29 JUILLET 2026</p>

        <a href="invitation.html" class="enter-btn">Découvrir l'invitation</a>
    </div>

    <script>
        const targetDate = new Date("July 29, 2026 17:30:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff > 0) {
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);

                document.getElementById("days").innerText = d.toString().padStart(2, "0");
                document.getElementById("hours").innerText = h.toString().padStart(2, "0");
                document.getElementById("mins").innerText = m.toString().padStart(2, "0");
                document.getElementById("secs").innerText = s.toString().padStart(2, "0");
            } else {
                document.getElementById("timer").innerHTML = "<h2 style='font-family:Great Vibes;color:#222;font-size:2.5rem;'>C'est le grand jour ✨</h2>";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
